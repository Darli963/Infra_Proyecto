name: Deploy Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"

jobs:
  deploy-prod:
    name: Terraform apply + app deploy prod
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail

          for required_var in AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en el environment prod."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-prod

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: terraform/environments/prod
        run: terraform apply -input=false -auto-approve -var-file="prod.tfvars"

      - name: Detectar hosts administrados para despliegue en prod
        id: discover_hosts
        run: |
          set -euo pipefail

          instance_ids="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters \
              "Name=instance-state-name,Values=running" \
              "Name=tag:Project,Values=infra-proyecto" \
              "Name=tag:Environment,Values=prod" \
              "Name=tag:Role,Values=app-server,test-instance" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [ -n "${instance_ids}" ] && [ "${instance_ids}" != "None" ]; then
            echo "has_hosts=true" >> "${GITHUB_OUTPUT}"
            {
              echo "instance_ids<<EOF"
              echo "${instance_ids}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            echo "Se encontraron instancias administrables en prod: ${instance_ids}"
          else
            echo "has_hosts=false" >> "${GITHUB_OUTPUT}"
            echo "No hay hosts de aplicacion en prod para desplegar por Ansible. Se completa solo Terraform apply."
          fi

      - name: Instalar dependencias de Ansible y Session Manager Plugin
        if: steps.discover_hosts.outputs.has_hosts == 'true'
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl unzip

          python3 -m pip install --upgrade pip
          python3 -m pip install ansible boto3 botocore

          ansible-galaxy collection install -r ansible/requirements.yml

          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

          ansible --version
          session-manager-plugin --version

      - name: Esperar a que los hosts prod aparezcan en Session Manager
        if: steps.discover_hosts.outputs.has_hosts == 'true'
        run: |
          set -euo pipefail

          for instance_id in ${{ steps.discover_hosts.outputs.instance_ids }}; do
            ready="false"

            for attempt in $(seq 1 20); do
              ping_status="$(aws ssm describe-instance-information \
                --region "${AWS_REGION}" \
                --filters "Key=InstanceIds,Values=${instance_id}" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || true)"

              if [ "${ping_status}" = "Online" ]; then
                echo "La instancia ${instance_id} ya esta administrada por SSM."
                ready="true"
                break
              fi

              echo "Esperando Session Manager para ${instance_id} (intento ${attempt}/20)..."
              sleep 15
            done

            if [ "${ready}" != "true" ]; then
              echo "::error::La instancia ${instance_id} no quedo disponible en SSM a tiempo."
              exit 1
            fi
          done

      - name: Ejecutar bootstrap por Ansible sobre prod
        if: steps.discover_hosts.outputs.has_hosts == 'true'
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/bootstrap.yml \
            -e target_hosts=deploy_prod

      - name: Desplegar aplicacion en prod por Ansible
        if: steps.discover_hosts.outputs.has_hosts == 'true'
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          aurora_secret_name="$(terraform -chdir=terraform/environments/prod output -raw aurora_secret_name)"

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/deploy_app.yml \
            -e target_hosts=deploy_prod \
            -e phase4_aurora_secret_name="${aurora_secret_name}"
