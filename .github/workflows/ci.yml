name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"

jobs:
  terraform-dev:
    name: Terraform dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          CI_AWS_ROLE_ARN: ${{ vars.CI_AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail
          for required_var in CI_AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en GitHub Actions."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-ci-terraform-dev

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform/environments/dev
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan -input=false -lock=false -no-color \
            -var-file="dev.tfvars" \
            -out="tfplan"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
