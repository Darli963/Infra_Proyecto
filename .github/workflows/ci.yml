name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - "feat/**"
      - "fix/**"
      - "infra/**"
      - "ci/**"
      - "refactor/**"
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - prod
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive "${{ github.workspace }}/terraform"

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -refresh=false -lock=false -input=false -var-file="${{ matrix.environment }}.tfvars"
