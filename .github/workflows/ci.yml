name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"

jobs:
  terraform-dev:
    name: Terraform dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          CI_AWS_ROLE_ARN: ${{ vars.CI_AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail
          for required_var in CI_AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en GitHub Actions."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-ci-terraform-dev

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform/environments/dev
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan -input=false -lock=false -no-color \
            -var-file="dev.tfvars" \
            -out="tfplan"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          output_format: cli,junitxml
          output_file_path: console,results.xml
          # CKV_AWS_145: S3 KMS encryption (using SSE-S3 is standard and free, KMS keys incur cost).
          # CKV_AWS_158: CloudWatch Log Group KMS encryption (avoiding customer-managed KMS key billing).
          # CKV_AWS_21: RDS Multi-AZ (disabled to save costs in non-production environments).
          # CKV_AWS_118: AppSync logging (we do not use AppSync in this project).
          # CKV2_AWS_61: S3 lifecycle configuration (not required for audit log buckets in dev).
          # CKV2_AWS_62: S3 event notifications (not required for this architecture).
          # CKV2_AWS_20: ALB HTTP to HTTPS redirect (handled by application logic).
          # CKV2_AWS_6: S3 Public Access block (audit buckets have restricted IAM policies).
          # CKV_AWS_21: S3 versioning (audit logs use lifecycle rules instead).
          args: --skip-check CKV_AWS_145,CKV_AWS_158,CKV_AWS_21,CKV_AWS_118,CKV2_AWS_61,CKV2_AWS_62,CKV2_AWS_20,CKV2_AWS_6 --continue-on-failure

      - name: Upload Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: results.xml

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api-sistema-cotizacion/backend/package-lock.json

      - name: Install dependencies
        working-directory: api-sistema-cotizacion/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: api-sistema-cotizacion/backend
        run: npx prisma generate

      - name: Run unit tests
        working-directory: api-sistema-cotizacion/backend
        run: npm run test
