name: Destroy Dev (Terraform Teardown)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: destroy-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"
  ENVIRONMENT: "dev"

jobs:
  destroy-infra:
    name: Terraform destroy dev
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          AWS_ROLE_ARN:    ${{ vars.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE:   ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail
          for required_var in AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en el environment dev."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-destroy-dev

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: Terraform plan (destroy)
        working-directory: terraform/environments/dev
        run: terraform plan -destroy -input=false -lock=false -var-file="dev.tfvars"

      - name: Terraform destroy
        working-directory: terraform/environments/dev
        run: terraform destroy -input=false -lock=false -auto-approve -var-file="dev.tfvars"
