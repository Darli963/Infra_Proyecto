name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"

jobs:
  deploy-dev:
    name: Terraform apply + app deploy dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail

          for required_var in AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en el environment dev."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-dev

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: terraform/environments/dev
        run: terraform apply -input=false -auto-approve -var-file="dev.tfvars"

      - name: Extract Terraform outputs
        working-directory: terraform/environments/dev
        run: |
          set -euo pipefail

          AURORA_SECRET_NAME=$(terraform output -raw aurora_secret_name)
          S3_BUCKET_NAME=$(terraform output -raw storage_bucket_name)
          CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_distribution_domain_name)
          CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          COGNITO_USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)
          COGNITO_CLIENT_ID=$(terraform output -raw cognito_client_id)
          TEST_INSTANCE_ID=$(terraform output -raw test_instance_id)

          for var in AURORA_SECRET_NAME S3_BUCKET_NAME CLOUDFRONT_DOMAIN CLOUDFRONT_DISTRIBUTION_ID COGNITO_USER_POOL_ID COGNITO_CLIENT_ID TEST_INSTANCE_ID; do
            if [ -z "${!var}" ] || [ "${!var}" = "null" ]; then
              echo "::error::Terraform output ${var} is empty or null"
              exit 1
            fi
          done

          echo "AURORA_SECRET_NAME=${AURORA_SECRET_NAME}" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}" >> $GITHUB_ENV
          echo "CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=${CLOUDFRONT_DISTRIBUTION_ID}" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}" >> $GITHUB_ENV
          echo "TEST_INSTANCE_ID=${TEST_INSTANCE_ID}" >> $GITHUB_ENV

          echo "Terraform outputs extracted successfully"

      - name: Build backend
        working-directory: api-sistema-cotizacion/backend
        run: |
          npm ci
          npm run build
          npx prisma generate

      - name: Instalar dependencias de Ansible y Session Manager Plugin
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl unzip

          python3 -m pip install --upgrade pip
          python3 -m pip install ansible "boto3>=1.35.0" "botocore>=1.35.0"

          ansible-galaxy collection install -r ansible/requirements.yml

          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

          ansible --version
          session-manager-plugin --version

      - name: Esperar a que la instancia dev aparezca en Session Manager
        env:
          TEST_INSTANCE_ID: ${{ env.TEST_INSTANCE_ID }}
        run: |
          set -euo pipefail

          instance_id="${TEST_INSTANCE_ID}"

          if [ -z "${instance_id}" ] || [ "${instance_id}" = "null" ]; then
            echo "::error::No se pudo resolver test_instance_id desde Terraform."
            exit 1
          fi

          for attempt in $(seq 1 20); do
            ping_status="$(aws ssm describe-instance-information \
              --region "${AWS_REGION}" \
              --filters "Key=InstanceIds,Values=${instance_id}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"

            if [ "${ping_status}" = "Online" ]; then
              echo "La instancia ${instance_id} ya esta administrada por SSM."
              exit 0
            fi

            echo "Esperando Session Manager para ${instance_id} (intento ${attempt}/20)..."
            sleep 15
          done

          echo "::error::La instancia ${instance_id} no quedo disponible en SSM a tiempo."
          exit 1

      - name: Ejecutar bootstrap por Ansible sobre dev
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ANSIBLE_AWS_SSM_BUCKET_NAME: ${{ env.S3_BUCKET_NAME }}
        run: |
          set -euo pipefail

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/bootstrap.yml \
            -e target_hosts=deploy_dev

      - name: Desplegar backend en dev por Ansible
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/deploy_backend.yml \
            -e target_hosts=deploy_dev \
            -e backend_aurora_secret_name="${AURORA_SECRET_NAME}" \
            -e backend_s3_bucket_name="${S3_BUCKET_NAME}" \
            -e backend_cloudfront_url="https://${CLOUDFRONT_DOMAIN}" \
            -e backend_aws_region="${AWS_REGION}" \
            -e backend_cognito_user_pool_id="${COGNITO_USER_POOL_ID}" \
            -e backend_cognito_client_id="${COGNITO_CLIENT_ID}"

      - name: Desplegar frontend en dev por Ansible
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ansible-playbook \
            ansible/playbooks/deploy_frontend.yml \
            -e frontend_cloudfront_domain="${CLOUDFRONT_DOMAIN}" \
            -e frontend_cloudfront_distribution_id="${CLOUDFRONT_DISTRIBUTION_ID}" \
            -e frontend_s3_bucket="${S3_BUCKET_NAME}" \
            -e frontend_aws_region="${AWS_REGION}" \
            -e frontend_cognito_user_pool_id="${COGNITO_USER_POOL_ID}" \
            -e frontend_cognito_client_id="${COGNITO_CLIENT_ID}"

      - name: Validar despliegue
        run: |
          set -euo pipefail

          echo "Validando health check en https://${CLOUDFRONT_DOMAIN}/api/healthz"
          curl -f https://${CLOUDFRONT_DOMAIN}/api/healthz

          echo "Despliegue validado exitosamente"
