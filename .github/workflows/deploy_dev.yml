name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"
  ENVIRONMENT: "dev"

jobs:
  deploy-infra:
    name: Terraform apply dev
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 20
    outputs:
      monitoring_instance_id: ${{ steps.tf-outputs.outputs.monitoring_instance_id }}
      grafana_private_ip: ${{ steps.tf-outputs.outputs.grafana_private_ip }}
      grafana_url: ${{ steps.tf-outputs.outputs.grafana_url }}
      storage_bucket_name: ${{ steps.tf-outputs.outputs.storage_bucket_name }}
      cloudfront_domain: ${{ steps.tf-outputs.outputs.cloudfront_domain }}
      cloudfront_distribution_id: ${{ steps.tf-outputs.outputs.cloudfront_distribution_id }}
      cognito_user_pool_id: ${{ steps.tf-outputs.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ steps.tf-outputs.outputs.cognito_client_id }}
      cognito_user_pool_endpoint: ${{ steps.tf-outputs.outputs.cognito_user_pool_endpoint }}
      aurora_secret_name: ${{ steps.tf-outputs.outputs.aurora_secret_name }}
      test_instance_id: ${{ steps.tf-outputs.outputs.test_instance_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validar configuracion requerida de GitHub Actions
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          set -euo pipefail

          for required_var in AWS_ROLE_ARN TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!required_var}" ]; then
              echo "::error::Falta configurar la variable ${required_var} en el environment dev."
              exit 1
            fi
          done

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-dev

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Purgar secretos pendientes de eliminación (solo dev)
        if: env.ENVIRONMENT == 'dev'
        run: |
          for s in redis aurora app-config; do
            STATE=$(aws secretsmanager describe-secret --secret-id "infra-proyecto/dev/$s" --query 'DeletedDate' --output text 2>/dev/null || echo "None")
            if [ "$STATE" != "None" ]; then
              aws secretsmanager delete-secret --secret-id "infra-proyecto/dev/$s" --force-delete-without-recovery
            fi
          done

      - name: Terraform apply
        working-directory: terraform/environments/dev
        run: terraform apply -input=false -auto-approve -var-file="dev.tfvars"

      - name: Extract Terraform outputs
        id: tf-outputs
        working-directory: terraform/environments/dev
        run: |
          set -euo pipefail

          AURORA_SECRET_NAME=$(terraform output -raw aurora_secret_name)
          S3_BUCKET_NAME=$(terraform output -raw storage_bucket_name)
          CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_distribution_domain_name)
          CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          COGNITO_USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)
          COGNITO_CLIENT_ID=$(terraform output -raw cognito_client_id)
          COGNITO_USER_POOL_ENDPOINT=$(terraform output -raw cognito_user_pool_endpoint)
          TEST_INSTANCE_ID=$(terraform output -raw test_instance_id)
          
          # Outputs opcionales del modulo de monitoreo
          MONITORING_INSTANCE_ID=$(terraform output -raw monitoring_instance_id 2>/dev/null || echo "")
          GRAFANA_PRIVATE_IP=$(terraform output -raw grafana_private_ip 2>/dev/null || echo "")
          GRAFANA_URL=$(terraform output -raw grafana_url 2>/dev/null || echo "")

          for var in AURORA_SECRET_NAME S3_BUCKET_NAME CLOUDFRONT_DOMAIN CLOUDFRONT_DISTRIBUTION_ID COGNITO_USER_POOL_ID COGNITO_CLIENT_ID COGNITO_USER_POOL_ENDPOINT TEST_INSTANCE_ID; do
            if [ -z "${!var}" ] || [ "${!var}" = "null" ]; then
              echo "::error::Terraform output ${var} is empty or null"
              exit 1
            fi
          done

          echo "aurora_secret_name=${AURORA_SECRET_NAME}" >> $GITHUB_OUTPUT
          echo "storage_bucket_name=${S3_BUCKET_NAME}" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=${CLOUDFRONT_DOMAIN}" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=${CLOUDFRONT_DISTRIBUTION_ID}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=${COGNITO_USER_POOL_ID}" >> $GITHUB_OUTPUT
          echo "cognito_client_id=${COGNITO_CLIENT_ID}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_endpoint=${COGNITO_USER_POOL_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "test_instance_id=${TEST_INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "monitoring_instance_id=${MONITORING_INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "grafana_private_ip=${GRAFANA_PRIVATE_IP}" >> $GITHUB_OUTPUT
          echo "grafana_url=${GRAFANA_URL}" >> $GITHUB_OUTPUT

  deploy-app:
    name: App deploy dev
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-infra
    env:
      AURORA_SECRET_NAME: ${{ needs.deploy-infra.outputs.aurora_secret_name }}
      S3_BUCKET_NAME: ${{ needs.deploy-infra.outputs.storage_bucket_name }}
      CLOUDFRONT_DOMAIN: ${{ needs.deploy-infra.outputs.cloudfront_domain }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.deploy-infra.outputs.cloudfront_distribution_id }}
      COGNITO_USER_POOL_ID: ${{ needs.deploy-infra.outputs.cognito_user_pool_id }}
      COGNITO_CLIENT_ID: ${{ needs.deploy-infra.outputs.cognito_client_id }}
      COGNITO_USER_POOL_ENDPOINT: ${{ needs.deploy-infra.outputs.cognito_user_pool_endpoint }}
      TEST_INSTANCE_ID: ${{ needs.deploy-infra.outputs.test_instance_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-app-dev

      - name: Build backend
        working-directory: api-sistema-cotizacion/backend
        run: |
          npm ci
          npm run build
          npx prisma generate

      - name: Instalar dependencias de Ansible y Session Manager Plugin
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y curl unzip

          python3 -m pip install --upgrade pip
          python3 -m pip install ansible "boto3>=1.35.0" "botocore>=1.35.0"

          ansible-galaxy collection install -r ansible/requirements.yml

          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

          ansible --version
          session-manager-plugin --version

      - name: Esperar a que la instancia dev aparezca en Session Manager
        env:
          TEST_INSTANCE_ID: ${{ env.TEST_INSTANCE_ID }}
        run: |
          set -euo pipefail

          instance_id="${TEST_INSTANCE_ID}"

          if [ -z "${instance_id}" ] || [ "${instance_id}" = "null" ]; then
            echo "::error::No se pudo resolver test_instance_id desde Terraform."
            exit 1
          fi

          for attempt in $(seq 1 20); do
            ping_status="$(aws ssm describe-instance-information \
              --region "${AWS_REGION}" \
              --filters "Key=InstanceIds,Values=${instance_id}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"

            if [ "${ping_status}" = "Online" ]; then
              echo "La instancia ${instance_id} ya esta administrada por SSM."
              exit 0
            fi

            echo "Esperando Session Manager para ${instance_id} (intento ${attempt}/20)..."
            sleep 15
          done

          echo "::error::La instancia ${instance_id} no quedo disponible en SSM a tiempo."
          exit 1

      - name: Ejecutar bootstrap por Ansible sobre dev
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ANSIBLE_AWS_SSM_BUCKET_NAME: ${{ env.S3_BUCKET_NAME }}
        run: |
          set -euo pipefail

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/bootstrap.yml \
            -e target_hosts=deploy_dev

      - name: Desplegar backend en dev por Ansible
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ANSIBLE_AWS_SSM_BUCKET_NAME: ${{ env.S3_BUCKET_NAME }}
        run: |
          set -euo pipefail

          ansible-playbook \
            -i ansible/inventory/aws_ec2.yml \
            ansible/playbooks/deploy_backend.yml \
            -e target_hosts=deploy_dev \
            -e backend_aurora_secret_name="${AURORA_SECRET_NAME}" \
            -e backend_s3_bucket_name="${S3_BUCKET_NAME}" \
            -e backend_cloudfront_url="https://${CLOUDFRONT_DOMAIN}" \
            -e backend_aws_region="${AWS_REGION}" \
            -e backend_cognito_user_pool_id="${COGNITO_USER_POOL_ID}" \
            -e backend_cognito_client_id="${COGNITO_CLIENT_ID}" \
            -e backend_cognito_user_pool_endpoint="${COGNITO_USER_POOL_ENDPOINT}"

      - name: Desplegar frontend en dev por Ansible
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          ansible-playbook \
            ansible/playbooks/deploy_frontend.yml \
            -e frontend_cloudfront_domain="${CLOUDFRONT_DOMAIN}" \
            -e frontend_cloudfront_distribution_id="${CLOUDFRONT_DISTRIBUTION_ID}" \
            -e frontend_s3_bucket="${S3_BUCKET_NAME}" \
            -e frontend_aws_region="${AWS_REGION}" \
            -e frontend_cognito_user_pool_id="${COGNITO_USER_POOL_ID}" \
            -e frontend_cognito_client_id="${COGNITO_CLIENT_ID}"

      - name: Validar despliegue
        run: |
          set -euo pipefail

          echo "Validando health check en https://${CLOUDFRONT_DOMAIN}/api/healthz"

          for attempt in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "https://${CLOUDFRONT_DOMAIN}/api/healthz" || true)

            echo "Intento ${attempt}/10 — HTTP ${status}"

            if [ "${status}" = "200" ]; then
              echo "Health check exitoso (HTTP 200)"
              echo "Despliegue validado exitosamente"
              exit 0
            fi

            if [ "${attempt}" -lt 10 ]; then
              echo "Esperando 15s antes del siguiente intento..."
              sleep 15
            fi
          done

          echo "::error::Health check falló después de 10 intentos. Último HTTP status: ${status}"
          exit 1

  validate-monitoring:
    name: Validar stack de monitoreo
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-infra
    if: needs.deploy-infra.outputs.monitoring_instance_id != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-monitor-dev

      - name: Esperar a que la instancia de monitoring aparezca en Session Manager
        run: aws ssm wait instance-online --instance-ids ${{ needs.deploy-infra.outputs.monitoring_instance_id }}

      - name: Validar que Grafana, Prometheus y Loki respondan
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ needs.deploy-infra.outputs.monitoring_instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://localhost:3000/api/health && curl -sf http://localhost:9090/-/healthy && curl -sf http://localhost:3100/ready"]' \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id $COMMAND_ID --instance-id ${{ needs.deploy-infra.outputs.monitoring_instance_id }}
