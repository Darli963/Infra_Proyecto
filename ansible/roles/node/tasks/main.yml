- name: Consultar version actual de Node.js
  ansible.builtin.command: node --version
  register: node_version
  changed_when: false
  failed_when: false

- name: Instalar Node.js si no esta disponible o no coincide la version esperada
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL "{{ phase4_node_setup_url }}" | bash -
    dnf install -y nodejs
  args:
    executable: /bin/bash
  when:
    - node_version.rc != 0 or not (node_version.stdout is match('^v' ~ phase4_node_major_version ~ '\\.'))
