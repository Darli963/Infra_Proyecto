---
# ---------------------------------------------------------------------------
# 1. Validación de variables requeridas
# ---------------------------------------------------------------------------
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - backend_aurora_secret_name is defined
      - backend_aurora_secret_name | length > 0
      - backend_s3_bucket_name is defined
      - backend_s3_bucket_name | length > 0
      - backend_cloudfront_url is defined
      - backend_cloudfront_url | length > 0
      - backend_cognito_user_pool_id is defined
      - backend_cognito_user_pool_id | length > 0
      - backend_cognito_client_id is defined
      - backend_cognito_client_id | length > 0
    fail_msg: "Required backend variables are not defined or empty"

# ---------------------------------------------------------------------------
# 2. Estructura de directorios
# ---------------------------------------------------------------------------
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
  loop:
    - /opt/phase4-app
    - /opt/phase4-app/releases
    - /opt/phase4-app/shared

- name: Create release directory
  ansible.builtin.file:
    path: "{{ backend_release_path }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

# ---------------------------------------------------------------------------
# 3. Verificar que el dist/ existe en el controlador ANTES de copiar
#    Si no existe, el error es en el build step del workflow, no aquí.
# ---------------------------------------------------------------------------
- name: Check that dist/ directory exists on controller (built in CI)
  ansible.builtin.stat:
    path: "{{ backend_source_dir }}/dist"
  register: dist_check
  delegate_to: localhost
  become: false

- name: Fail clearly if dist/ was not built
  ansible.builtin.fail:
    msg: >
      El directorio dist/ no existe en {{ backend_source_dir }}/dist.
      Asegúrate de que el paso 'Build backend' (npm run build) se ejecutó
      antes de este playbook y que el working-directory es correcto.
  when: not dist_check.stat.exists or not dist_check.stat.isdir

- name: List dist/ contents (verify build output)
  ansible.builtin.command: ls -la "{{ backend_source_dir }}/dist/"
  register: dist_contents
  delegate_to: localhost
  become: false
  changed_when: false

- name: Show dist/ contents
  ansible.builtin.debug:
    var: dist_contents.stdout_lines

# ---------------------------------------------------------------------------
# 4. Copiar archivos de la aplicación
#    Permisos 0644 para archivos, 0755 para directorios (Node necesita leerlos)
# ---------------------------------------------------------------------------
- name: Copy backend application files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ backend_release_path }}/{{ item.dest }}"
    owner: ec2-user
    group: ec2-user
    mode: '0644'
  loop:
    - { src: "{{ backend_source_dir }}/dist/", dest: "dist/" }
    - { src: "{{ backend_source_dir }}/start.js", dest: "start.js" }
    - { src: "{{ backend_source_dir }}/package.json", dest: "package.json" }
    - { src: "{{ backend_source_dir }}/package-lock.json", dest: "package-lock.json" }
    - { src: "{{ backend_source_dir }}/prisma/", dest: "prisma/" }

# Restaurar permisos de directorio (copy los pone 0755 por defecto, pero lo hacemos explícito)
- name: Ensure dist directory is executable/readable
  ansible.builtin.file:
    path: "{{ backend_release_path }}/{{ item }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
    recurse: false
  loop:
    - "."
    - "dist"
    - "prisma"

# ---------------------------------------------------------------------------
# 5. Instalar TODAS las dependencias (incluyendo devDependencies)
#    porque prisma CLI está en devDependencies y se necesita para generate
# ---------------------------------------------------------------------------
- name: Install ALL npm dependencies (including devDependencies for prisma)
  ansible.builtin.shell: |
    runuser -u ec2-user -- bash -lc 'cd {{ backend_release_path }} && npm ci 2>&1'
  register: npm_install
  changed_when: true

- name: Show npm install output
  ansible.builtin.debug:
    var: npm_install.stdout_lines

# ---------------------------------------------------------------------------
# 6. Generar cliente Prisma (necesita devDependencies instaladas)
# ---------------------------------------------------------------------------
- name: Generate Prisma client
  ansible.builtin.shell: |
    runuser -u ec2-user -- bash -lc 'cd {{ backend_release_path }} && npx prisma generate 2>&1'
  register: prisma_generate
  changed_when: true

- name: Show Prisma generate output
  ansible.builtin.debug:
    var: prisma_generate.stdout_lines

# ---------------------------------------------------------------------------
# 7. Obtener credenciales de BD y construir DATABASE_URL
# ---------------------------------------------------------------------------
- name: Fetch database credentials from Secrets Manager
  ansible.builtin.command:
    cmd: /usr/local/bin/phase4-fetch-secret {{ backend_aws_region | default('us-east-1') }} {{ backend_aurora_secret_name }}
  register: db_secret
  changed_when: false
  no_log: true

- name: Parse database secret
  ansible.builtin.set_fact:
    db_secret_data: "{{ db_secret.stdout | from_json }}"
  no_log: true

- name: Build DATABASE_URL from secret fields
  ansible.builtin.set_fact:
    database_url: "postgresql://{{ db_secret_data.username | urlencode }}:{{ db_secret_data.password | urlencode }}@{{ db_secret_data.host }}:{{ db_secret_data.port | default('5432') }}/{{ db_secret_data.dbname }}?sslmode=require"
  no_log: true

# ---------------------------------------------------------------------------
# 8. Ejecutar migraciones Prisma
# ---------------------------------------------------------------------------
- name: Run Prisma migrations
  ansible.builtin.shell: |
    runuser -u ec2-user -- bash -lc 'cd {{ backend_release_path }} && DATABASE_URL="{{ database_url }}" npx prisma migrate deploy 2>&1'
  register: prisma_migrate
  changed_when: true
  no_log: true

- name: Show migration result (without sensitive data)
  ansible.builtin.debug:
    msg: "Prisma migrate deploy completed with rc={{ prisma_migrate.rc }}"

# ---------------------------------------------------------------------------
# 9. Actualizar symlink current → release
# ---------------------------------------------------------------------------
- name: Update current symlink
  ansible.builtin.file:
    src: "{{ backend_release_path }}"
    dest: /opt/phase4-app/current
    state: link
    owner: ec2-user
    group: ec2-user
    force: true

# ---------------------------------------------------------------------------
# 10. Crear .env CON DATABASE_URL antes de arrancar el servicio
#     systemd lo lee via EnvironmentFile antes de ejecutar ExecStart
# ---------------------------------------------------------------------------
- name: Create .env file with all required variables
  ansible.builtin.template:
    src: backend.env.j2
    dest: /opt/phase4-app/current/.env
    owner: ec2-user
    group: ec2-user
    mode: '0600'

# ---------------------------------------------------------------------------
# 11. Instalar/actualizar unit de systemd
# ---------------------------------------------------------------------------
- name: Create systemd service file for cotizacion-app
  ansible.builtin.template:
    src: cotizacion-app.service.j2
    dest: /etc/systemd/system/cotizacion-app.service
    mode: '0644'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

# ---------------------------------------------------------------------------
# 12. Parar servicio si estaba corriendo (reset limpio)
# ---------------------------------------------------------------------------
- name: Stop cotizacion-app service if running
  ansible.builtin.systemd:
    name: cotizacion-app
    state: stopped
  failed_when: false

# ---------------------------------------------------------------------------
# 13. Prueba manual con captura de stdout+stderr
#     Identifica errores ANTES de intentar arrancar via systemd
# ---------------------------------------------------------------------------
- name: Test starting app manually to capture early errors (stdout+stderr)
  ansible.builtin.shell: |
    runuser -u ec2-user -- bash -lc '
      set -a
      source /opt/phase4-app/current/.env
      set +a
      cd /opt/phase4-app/current
      node start.js 2>&1 &
      NODE_PID=$!
      sleep 5
      if kill -0 $NODE_PID 2>/dev/null; then
        echo "[OK] Node sigue corriendo despues de 5s (buen signo)"
        kill $NODE_PID 2>/dev/null || true
      else
        echo "[FAIL] Node termino antes de 5s"
      fi
    '
  register: manual_test
  changed_when: false
  ignore_errors: true

- name: Show manual test output (stdout+stderr combined)
  ansible.builtin.debug:
    msg: "{{ manual_test.stdout_lines + manual_test.stderr_lines }}"

# ---------------------------------------------------------------------------
# 14. Verificar que dist/server.js existe en la EC2
# ---------------------------------------------------------------------------
- name: Verify dist/server.js exists on target
  ansible.builtin.stat:
    path: /opt/phase4-app/current/dist/server.js
  register: server_js_check

- name: Show dist/server.js status
  ansible.builtin.debug:
    msg: >
      dist/server.js {{ 'EXISTS' if server_js_check.stat.exists else 'MISSING - build not copied correctly' }}

- name: List dist/ contents on target
  ansible.builtin.command: ls -la /opt/phase4-app/current/dist/
  register: dist_target_contents
  changed_when: false
  ignore_errors: true

- name: Show dist/ contents on target
  ansible.builtin.debug:
    var: dist_target_contents.stdout_lines

# ---------------------------------------------------------------------------
# 15. Arrancar y habilitar el servicio
# ---------------------------------------------------------------------------
- name: Ensure cotizacion-app service is started and enabled
  ansible.builtin.systemd:
    name: cotizacion-app
    state: started
    enabled: true
    daemon_reload: false

- name: Wait 20 seconds for service to stabilize
  ansible.builtin.wait_for:
    timeout: 20

# ---------------------------------------------------------------------------
# 16. Diagnóstico post-arranque — stdout_lines Y stderr_lines
# ---------------------------------------------------------------------------
- name: Get cotizacion-app journal logs (full output)
  ansible.builtin.shell: journalctl -u cotizacion-app -b --no-pager --no-hostname -o short-precise -n 150 2>&1
  register: service_logs
  changed_when: false
  ignore_errors: true

- name: Show cotizacion-app journal logs
  ansible.builtin.debug:
    var: service_logs.stdout_lines

- name: Check cotizacion-app service status
  ansible.builtin.command: systemctl status cotizacion-app --no-pager -l
  register: service_status
  changed_when: false
  ignore_errors: true

- name: Show cotizacion-app service status
  ansible.builtin.debug:
    var: service_status.stdout_lines

# ---------------------------------------------------------------------------
# 17. Healthcheck final
# ---------------------------------------------------------------------------
- name: Wait for application to be ready on port 3000
  ansible.builtin.wait_for:
    port: 3000
    host: 127.0.0.1
    delay: 5
    timeout: 120
    msg: "Timed out waiting for cotizacion-app on port 3000"

- name: Verify application health endpoint
  ansible.builtin.uri:
    url: http://127.0.0.1:3000/api/healthz
    method: GET
    status_code: 200
  register: health_check
  retries: 10
  delay: 10
  until: health_check.status == 200
