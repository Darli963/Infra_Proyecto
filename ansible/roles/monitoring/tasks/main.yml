- name: Instalar CloudWatch Agent cuando el monitoreo esta habilitado
  ansible.builtin.package:
    name: amazon-cloudwatch-agent
    state: present
  when: phase4_monitoring_enabled | bool

- name: Configurar CloudWatch Agent cuando el monitoreo esta habilitado
  ansible.builtin.template:
    src: amazon-cloudwatch-agent.json.j2
    dest: "{{ phase4_monitoring_config_path }}"
    owner: root
    group: root
    mode: "0644"
  when: phase4_monitoring_enabled | bool
  notify: Reiniciar CloudWatch Agent

- name: Asegurar que CloudWatch Agent quede habilitado
  ansible.builtin.service:
    name: amazon-cloudwatch-agent
    state: started
    enabled: true
  when: phase4_monitoring_enabled | bool
