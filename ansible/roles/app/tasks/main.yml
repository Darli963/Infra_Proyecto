- name: Validar que se definio el secreto de Aurora
  ansible.builtin.assert:
    that:
      - phase4_aurora_secret_name | length > 0
    fail_msg: "Debes definir `phase4_aurora_secret_name` para comprobar la conexion con Aurora."

- name: Recrear el directorio de release actual
  ansible.builtin.file:
    path: "{{ phase4_app_release_dir }}"
    state: absent

- name: Crear el directorio de release
  ansible.builtin.file:
    path: "{{ phase4_app_release_dir }}"
    state: directory
    owner: "{{ phase4_app_user }}"
    group: "{{ phase4_app_group }}"
    mode: "0755"

- name: Copiar el artefacto de la aplicacion
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/phase4-smoke-app/"
    dest: "{{ phase4_app_release_dir }}/"
    owner: "{{ phase4_app_user }}"
    group: "{{ phase4_app_group }}"
    mode: preserve

- name: Crear archivo de entorno de la aplicacion
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ phase4_app_release_dir }}/.env"
    owner: "{{ phase4_app_user }}"
    group: "{{ phase4_app_group }}"
    mode: "0640"
  notify: Reiniciar aplicacion

- name: Asegurar permisos del release desplegado
  ansible.builtin.file:
    path: "{{ phase4_app_release_dir }}"
    state: directory
    owner: "{{ phase4_app_user }}"
    group: "{{ phase4_app_group }}"
    recurse: true

- name: Instalar dependencias de la aplicacion
  ansible.builtin.shell: |
    runuser -u {{ phase4_app_user }} -- bash -lc 'cd {{ phase4_app_release_dir }} && npm install --omit=dev'
  register: npm_install
  changed_when: "'up to date' not in npm_install.stdout"

- name: Inspeccionar el path current antes de enlazar
  ansible.builtin.stat:
    path: "{{ phase4_app_dir }}"
    follow: false
  register: current_path

- name: Eliminar current si existe como directorio real
  ansible.builtin.file:
    path: "{{ phase4_app_dir }}"
    state: absent
  when:
    - current_path.stat.exists | default(false)
    - current_path.stat.isdir | default(false)
    - not current_path.stat.islnk | default(false)

- name: Actualizar el enlace simbolico current
  ansible.builtin.file:
    src: "{{ phase4_app_release_dir }}"
    dest: "{{ phase4_app_dir }}"
    state: link
    force: true
  notify: Reiniciar aplicacion

- name: Crear unidad systemd para la aplicacion
  ansible.builtin.template:
    src: app.service.j2
    dest: "/etc/systemd/system/{{ phase4_service_name }}.service"
    mode: "0644"
  notify:
    - Recargar systemd
    - Reiniciar aplicacion

- name: Aplicar handlers pendientes
  ansible.builtin.meta: flush_handlers

- name: Asegurar que la aplicacion quede habilitada y en ejecucion
  ansible.builtin.systemd_service:
    name: "{{ phase4_service_name }}"
    state: started
    enabled: true

- name: Esperar a que el puerto de la aplicacion responda
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ phase4_app_port }}"
    timeout: 30

- name: Validar healthcheck local de la aplicacion
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ phase4_app_port }}/healthz"
    method: GET
    status_code: 200
  register: app_healthcheck
  retries: 5
  delay: 3
  until: app_healthcheck.status == 200
