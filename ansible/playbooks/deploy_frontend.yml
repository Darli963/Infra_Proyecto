---
- name: Deploy Frontend to S3 and CloudFront
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    frontend_source_dir: "{{ playbook_dir }}/../../api-sistema-cotizacion/frontend"
    frontend_dist_dir: "{{ frontend_source_dir }}/dist"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - frontend_cloudfront_domain is defined
          - frontend_cloudfront_domain | length > 0
          - frontend_s3_bucket is defined
          - frontend_s3_bucket | length > 0
          - frontend_aws_region is defined
          - frontend_aws_region | length > 0
          - frontend_cognito_user_pool_id is defined
          - frontend_cognito_user_pool_id | length > 0
          - frontend_cognito_client_id is defined
          - frontend_cognito_client_id | length > 0
        fail_msg: "Required frontend variables are not defined or empty"

    - name: Check if frontend source directory exists
      ansible.builtin.stat:
        path: "{{ frontend_source_dir }}"
      register: frontend_source

    - name: Fail if frontend source directory does not exist
      ansible.builtin.fail:
        msg: "Frontend source directory not found at {{ frontend_source_dir }}"
      when: not frontend_source.stat.exists

  tasks:
    # -----------------------------------------------------------------------
    # 1. Crear .env.production con variables de runtime
    # -----------------------------------------------------------------------
    - name: Create .env.production file
      ansible.builtin.copy:
        dest: "{{ frontend_source_dir }}/.env.production"
        content: |
          VITE_API_BASE_URL=https://{{ frontend_cloudfront_domain }}/api
          VITE_COGNITO_REGION={{ frontend_aws_region }}
          VITE_COGNITO_USER_POOL_ID={{ frontend_cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID={{ frontend_cognito_client_id }}
          VITE_CLOUDFRONT_URL=https://{{ frontend_cloudfront_domain }}
        mode: '0600'

    # -----------------------------------------------------------------------
    # 2. Instalar dependencias y compilar el frontend
    # -----------------------------------------------------------------------
    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ frontend_source_dir }}"
      register: npm_install
      changed_when: true

    - name: Build frontend
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ frontend_source_dir }}"
      environment:
        NODE_ENV: production
      register: npm_build
      changed_when: true

    - name: Show build output
      ansible.builtin.debug:
        var: npm_build.stdout_lines
      when: npm_build.stdout_lines | length > 0

    - name: Check if dist directory exists after build
      ansible.builtin.stat:
        path: "{{ frontend_dist_dir }}"
      register: frontend_dist

    - name: Fail if build did not create dist directory
      ansible.builtin.fail:
        msg: "Frontend build did not create dist directory at {{ frontend_dist_dir }}"
      when: not frontend_dist.stat.exists

    # -----------------------------------------------------------------------
    # 3. Subir assets con cache agresivo (todo excepto index.html)
    #    Usamos AWS CLI directamente — no depende de versiones de colecciones
    # -----------------------------------------------------------------------
    - name: Sync frontend assets to S3 (with long-term cache, excluding index.html)
      ansible.builtin.command:
        cmd: >
          aws s3 sync {{ frontend_dist_dir }}/
          s3://{{ frontend_s3_bucket }}/frontend/
          --region {{ frontend_aws_region }}
          --delete
          --exclude "index.html"
          --cache-control "public,max-age=31536000,immutable"
          --no-progress
      register: s3_sync
      changed_when: "'upload' in s3_sync.stdout or 'delete' in s3_sync.stdout"

    - name: Show S3 sync output
      ansible.builtin.debug:
        var: s3_sync.stdout_lines
      when: s3_sync.stdout_lines | length > 0

    # -----------------------------------------------------------------------
    # 4. Subir index.html sin cache (siempre debe ser fresco)
    # -----------------------------------------------------------------------
    - name: Upload index.html without caching
      ansible.builtin.command:
        cmd: >
          aws s3 cp {{ frontend_dist_dir }}/index.html
          s3://{{ frontend_s3_bucket }}/frontend/index.html
          --region {{ frontend_aws_region }}
          --cache-control "no-cache,no-store,must-revalidate"
          --content-type "text/html"
          --no-progress
      register: s3_upload_index
      changed_when: true

    # -----------------------------------------------------------------------
    # 5. Invalidar caché de CloudFront
    # -----------------------------------------------------------------------
    - name: Create CloudFront cache invalidation
      ansible.builtin.command:
        cmd: >
          aws cloudfront create-invalidation
          --distribution-id {{ frontend_cloudfront_distribution_id }}
          --paths "/*"
          --region {{ frontend_aws_region }}
      register: cf_invalidation
      changed_when: true
      when: frontend_cloudfront_distribution_id is defined and frontend_cloudfront_distribution_id | length > 0

    - name: Show CloudFront invalidation result
      ansible.builtin.debug:
        var: cf_invalidation.stdout_lines
      when:
        - frontend_cloudfront_distribution_id is defined
        - cf_invalidation.stdout_lines is defined
        - cf_invalidation.stdout_lines | length > 0

    # -----------------------------------------------------------------------
    # 6. Confirmación final
    # -----------------------------------------------------------------------
    - name: Display deployment status
      ansible.builtin.debug:
        msg: "Frontend deployment successful. Available at https://{{ frontend_cloudfront_domain }}"
